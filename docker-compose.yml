services:
  mysql:
    image: mysql:8.0
    container_name: smartroute-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartroute
    ports:
      - "3306:3306"
    volumes:
      - smartroute-mysql-data:/var/lib/mysql

volumes:
  smartroute-mysql-data:

